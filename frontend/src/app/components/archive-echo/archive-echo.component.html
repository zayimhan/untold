@if (match) {
  <div class="letter-wrap">
    <div class="letter-paper">

      <p class="letter-heading">In 1973, someone could not say this either.</p>
      <div class="letter-rule"></div>

      <div class="letter-body">
        @for (line of textLines; track $index) {
          <span
            class="letter-line"
            [style.animation-delay]="($index * 0.5 + 0.6) + 's'"
          >{{ line }}</span>
        }
      </div>

      <p class="letter-sig" [style.animation-delay]="sigDelay">
        &mdash;&thinsp;{{ match.context }}, {{ match.year }}
      </p>

    </div>
  </div>
}
